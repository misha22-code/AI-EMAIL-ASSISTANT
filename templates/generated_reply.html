<!DOCTYPE html>
<html>
<head>
    <title>AI Reply Generated</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f7fb;
            padding:40px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
            max-width:800px;
            margin:auto;
        }

        textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-top:10px;
        }

        button{
            background:#16a34a;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            margin-top:15px;
            cursor:pointer;
        }

        .download-btn{
            background:#2563eb;
            margin-left:10px;
        }

        .back{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
        }

        .urgent-badge{
            background:red;
            color:white;
            padding:4px 8px;
            border-radius:6px;
            margin-left:10px;
        }

        .summary-box{
            background:#f1f5f9;
            padding:10px;
            border-radius:8px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>AI Reply Generated</h2>

    <p>
        <b>Tone:</b> {{ tone }}

        {% if urgency == "Urgent" %}
            <span class="urgent-badge">🚨 Urgent</span>
        {% endif %}
    </p>

    <p><b>Summary:</b></p>
    <div class="summary-box">
        {{ summary }}
    </div>

    <!-- SEND EMAIL -->
    <form action="/send_reply" method="post">
        <input type="hidden" name="to_email" value="{{ to_email }}">
        <input type="hidden" name="subject" value="{{ subject }}">

        <p><b>Edit Reply:</b></p>
        <textarea name="reply" rows="10">{{ reply }}</textarea>

        <br>
        <button type="submit">Approve & Send Email</button>
    </form>

    <!-- DOWNLOAD PDF BUTTON -->
    <form method="POST" action="/download_reply">
        <input type="hidden" name="reply" value="{{ reply }}">
        <button type="submit" class="download-btn">📄 Download Reply PDF</button>
    </form>

    <a class="back" href="/emails">← Back to Emails</a>
</div>

</body>
</html>
